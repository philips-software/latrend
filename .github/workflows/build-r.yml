on:
  push:

name: latrend 

jobs:
  build:
    runs-on: [self-hosted, research]
    container: rocker/r-base:3.6.3
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Install curl
        if: runner.os == 'Linux'
        run: apt-get update && apt-get install -y libcurl4-openssl-dev
        
      - name: Install packages
        run: |
          R -e 'install.packages("renv")'
          R -e 'renv::restore()'
          R -e 'install.packages("devtools")'

      - name: Check
        run: |
          R -e 'devtools::check(document = TRUE, build_args = c('--no-build-vignettes'), args=c('--ignore-vignettes', '--no-examples'))'

      - name: Build
        run: |
          R -e 'devtools::build(vignettes=FALSE)'


