on:
  push:

name: latrend 

jobs:
  build:
    runs-on: [self-hosted, research]
    container: rocker/r-base:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Install packages
        run: |
          R -e 'install.packages("renv")'
          R -e 'renv::restore()'
          R -e 'install.packages("pkgbuild")'
          R -e 'install.packages("rcmdcheck")'
          R -e 'install.packages("data.table")'

      - name: Check
        run: |
          R -e 'rcmdcheck(build_args = c('--no-build-vignettes'), args=c('--ignore-vignettes', '--no-examples'))'

      - name: Build
        run: |
          R -e 'pkgbuild::build(vignettes=FALSE, needs_compilation=FALSE)'
          R -e 'devtools::build(args = c('--no-build-vignettes'))'


