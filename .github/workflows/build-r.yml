on:
  push:

name: latrend 

jobs:
  build:
    runs-on: [self-hosted, research]
    container: rocker/r-base:3.6.3
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Install curl
        if: runner.os == 'Linux'
        run: apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -yq libcurl4-openssl-dev libssl-dev libxml2-dev xorg libx11-dev libglu1-mesa-dev
        
      - name: Install packages
        run: |
          R -e 'install.packages("renv")'
          R -e 'renv::restore()'
          R -e 'install.packages("devtools")'
          R -e 'install.packages(c("testthat", "roxygen2", "knitr", "rmarkdown"))'
          R -e 'install.packages(c("R.utils", "assertthat", "foreach", "data.table", "longitudinalData", "magrittr", "plyr", "ggplot2", "matrixStats", "stackoverflow", "clusterCrit", "mclustcomp", "caret"))'
          R -e 'install.packages(c("kml", "lcmm", "mclust", "longclust", "mixtools", "flexmix", "fda", "funFEM", "IMIFA", "crimCV", "akmedoids", "dtwclust", "mixAK", "psych", "lme4"))'

      - name: Check
        run: |
          R -e 'devtools::check(document = TRUE, build_args = c('--no-build-vignettes'), args=c('--ignore-vignettes', '--no-examples'))'

      - name: Build
        run: |
          R -e 'devtools::build(vignettes=FALSE)'


